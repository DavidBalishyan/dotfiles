;=====================================================
;   Tokyo Night - polybar
;=====================================================

[colors]
bg           = #1a1b26
bg-alt       = #16161e
bg-highlight = #292e42
fg           = #c0caf5
fg-alt       = #a9b1d6
comment      = #565f89
blue         = #7aa2f7
cyan         = #7dcfff
green        = #9ece6a
magenta      = #bb9af7
red          = #f7768e
orange       = #ff9e64
yellow       = #e0af68
teal         = #1abc9c

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 30
radius = 0
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3

border-bottom-size = 2
border-bottom-color = ${colors.bg-highlight}

padding-left = 1
padding-right = 2
module-margin-left = 1
module-margin-right = 1
separator = %{F#565f89}·%{F-}

font-0 = JetBrainsMono Nerd Font:style=Bold:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Regular:size=10;2
font-2 = JetBrainsMono Nerd Font:size=13;3

modules-left = bspwm xwindow
modules-center = date
modules-right = pulseaudio backlight nightlight network bluetooth battery powermenu tray

cursor-click = pointer
enable-ipc = true

;-----------------------------------------------------

[module/bspwm]
type = internal/bspwm
pin-workspaces = true

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.bg-highlight}
label-focused-underline = ${colors.blue}
label-focused-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.fg-alt}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-underline = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.comment}
label-empty-padding = 1

;-----------------------------------------------------

[module/xwindow]
type = internal/xwindow
label = %title%
label-maxlen = 50
label-empty =
label-foreground = ${colors.fg-alt}
label-padding = 1

;-----------------------------------------------------

[module/date]
type = internal/date
interval = 1
date = %a %d.%m.%Y
time = %H:%M
label = %{F#7aa2f7}%{F-} %date%  %{F#7dcfff}%{F-} %time%

;-----------------------------------------------------

[module/pulseaudio]
type = internal/pulseaudio
click-right = pavucontrol

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.green}
label-volume = %percentage%%

label-muted = %{F#565f89}󰝟 muted%{F-}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

;-----------------------------------------------------

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <ramp> <label>
format-foreground = ${colors.yellow}
label = %percentage%%
ramp-0 = 󰃞
ramp-1 = 󰃟
ramp-2 = 󰃠

;-----------------------------------------------------

[module/nightlight]
type = custom/script
exec = ~/.config/polybar/scripts/nightlight.sh
interval = 5
click-left = ~/.config/polybar/scripts/nightlight.sh toggle
format-foreground = ${colors.orange}
label = %output%

;-----------------------------------------------------

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 5
click-left = ~/.config/polybar/scripts/network.sh menu
format-foreground = ${colors.magenta}
label = %output%

;-----------------------------------------------------

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
click-left = ~/.config/polybar/scripts/bluetooth.sh menu
format-foreground = ${colors.cyan}
label = %output%

;-----------------------------------------------------

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 99

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.green}
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.orange}
label-discharging = %percentage%%

format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}
label-full = %percentage%%

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹
ramp-capacity-0-foreground = ${colors.red}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰂉
animation-charging-framerate = 750

;-----------------------------------------------------

[module/powermenu]
type = custom/text
content = 
content-foreground = ${colors.red}
content-padding = 1
click-left = ~/.config/rofi/powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.bg}
tray-padding = 2
tray-scale = 1.0
