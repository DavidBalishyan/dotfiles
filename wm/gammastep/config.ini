; Night light. Toggled manually from the polybar (see scripts/nightlight.sh);
; that script warms the screen to temp-night below. lat/lon are unused in
; manual mode but kept in case you switch back to automatic (location) mode.
[general]
temp-day=6500
temp-night=4000
adjustment-method=randr
location-provider=manual
fade=1

[manual]
lat=40.18
lon=44.51
