# Ly display manager configuration
# Color format: 0xSSRRGGBB (SS = styling, RR = red, GG = green, BB = blue)
# Styling: TB_BOLD 0x01, TB_UNDERLINE 0x20, TB_BRIGHT 0x40

# Tokyonight-inspired palette
bg = 0x001A1B26
fg = 0x00C0CAF5
border_fg = 0x007AA2F7
error_bg = 0x001A1B26
error_fg = 0x01F7768C

blank_box = true
hide_borders = false
full_color = true
bigclock = en
clock = %a %d %b   %H:%M

# Default session (must match a .desktop file name in /usr/share/xsessions/)
auto_login_session = null
auto_login_user = null

default_input = login
input_len = 34
type_username = false
asterisk = *
clear_password = false
show_password_key = F7

allow_empty_password = true
animation = none
numlock = false
vi_mode = false
service_name = ly
save_file_dir = /etc/ly
path = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
xsessions = /usr/share/xsessions
waylandsessions = /usr/share/wayland-sessions
custom_sessions = /etc/ly/custom-sessions
shell = true
login_cmd = null
logout_cmd = null
setup_cmd = /etc/ly/setup.sh
start_cmd = /etc/ly/startup.sh
ly_log = /var/log/ly.log
session_log = .local/state/ly-session.log
xinitrc = ~/.xinitrc

shutdown_key = F1
restart_key = F2
brightness_down_key = F5
brightness_up_key = F6
brightness_down_cmd = /usr/bin/brightnessctl -q -n s 10%-
brightness_up_cmd = /usr/bin/brightnessctl -q -n s +10%

corner_top_left = shutdown,restart,britup,britdown,password battery
corner_top_right = clock numlock,capslock
corner_bottom_left = version
corner_bottom_right = labels
