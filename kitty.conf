# Colors
# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Background and foreground
background #1a1b26
foreground #c0caf5

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 15

# Cell height offset
modify_font cell_height 2px

# Window padding
window_padding_width 6 6

# Fully opaque
background_opacity 1.00

# Set the cursor to block
shell_integration no-cursor

# Multiplexer keybindings
# Pane navigation (Alt+h/j/k/l)
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Pane resizing (Alt+Shift+h/j/k/l)
map alt+shift+h resize_window narrower 5
map alt+shift+j resize_window shorter 5
map alt+shift+k resize_window taller 5
map alt+shift+l resize_window wider 5

# Splits
map alt+minus launch --location=hsplit --cwd=current
map alt+shift+backslash launch --location=vsplit --cwd=current

# Close current pane
map alt+w close_window

# New tab
map alt+t new_tab_with_cwd

# Reload kitty.conf
map alt+r load_config_file

# Tab switching (like your M-1..M-0)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

# Next/Previous tab
map alt+period next_tab
map alt+comma previous_tab

# Tab bar theme
tab_bar_style powerline
tab_bar_edge top

tab_bar_background      #15161e

active_tab_background   #7aa2f7
active_tab_foreground   #1a1b26
active_tab_font_style   bold

inactive_tab_background #414868
inactive_tab_foreground #a9b1d6

tab_separator " "
tab_title_template "{index}: {title}"
