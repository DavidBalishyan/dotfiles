[colors]
background = '#1a1b26'
foreground = '#c0caf5'

# Regular colors
black = '#15161e'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#bb9af7'
cyan = '#7dcfff'
white = '#a9b1d6'

# Bright colors (light- prefix in Rio)
light-black = '#414868'
light-red = '#f7768e'
light-green = '#9ece6a'
light-yellow = '#e0af68'
light-blue = '#7aa2f7'
light-magenta = '#bb9af7'
light-cyan = '#7dcfff'
light-white = '#c0caf5'

[fonts]
size = 14

[fonts.regular]
family = "JetBrainsMono Nerd Font"
style = "default"

[fonts.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[fonts.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[fonts.bold-italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

padding = [6]
